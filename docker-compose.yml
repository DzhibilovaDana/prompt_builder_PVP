services:
  postgres:
    image: postgres:16-alpine
    container_name: prompt-builder-postgres
    environment:
      - POSTGRES_DB=prompt_builder
      - POSTGRES_USER=prompt_builder
      - POSTGRES_PASSWORD=prompt_builder
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompt_builder -d prompt_builder"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    container_name: prompt-builder
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://prompt_builder:prompt_builder@postgres:5432/prompt_builder}
      - PB_API_TOKEN=${PB_API_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/providers/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  pg_data:
